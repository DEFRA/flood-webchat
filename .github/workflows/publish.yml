name: Publish to NPM
on:
  release:
    types:
      - published

permissions:
  id-token: write
  contents: read

jobs:
  version-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.release.tag_name }}
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
      - name: OIDC preflight
        run: |
          node -v
          npm -v
          if [ -z "$ACTIONS_ID_TOKEN_REQUEST_URL" ] || [ -z "$ACTIONS_ID_TOKEN_REQUEST_TOKEN" ]; then
            echo "OIDC token variables are not available. Check id-token permission and trusted publisher mapping."
            exit 1
          fi
      - name: Exchange OIDC token and configure npm
        run: |
          set -euo pipefail
          OIDC_TOKEN=$(curl -sS -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=npm:registry.npmjs.org" | node -e "let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>{process.stdout.write(JSON.parse(d).value)})")
          STATUS=$(curl -sS -o /tmp/npm-oidc-response.json -w "%{http_code}" -X POST "https://registry.npmjs.org/-/npm/v1/oidc/token/exchange/package/%40defra%2Fflood-webchat" -H "Authorization: Bearer ${OIDC_TOKEN}")
          echo "npm OIDC exchange HTTP status: ${STATUS}"
          if [ "${STATUS}" != "201" ]; then
            echo "npm OIDC exchange failed. This indicates trusted publisher mapping mismatch on npm package settings."
            cat /tmp/npm-oidc-response.json
            exit 1
          fi
          NPM_AUTH_TOKEN=$(node -e "const d = require('/tmp/npm-oidc-response.json'); process.stdout.write(d.token)")
          npm config set //registry.npmjs.org/:_authToken="${NPM_AUTH_TOKEN}"
          echo "npm auth token configured"
      - name: install dependencies
        run: |
          set -euo pipefail
          if ! npm ci --foreground-scripts; then
            echo "npm ci failed. Dumping npm debug logs..."
            find /home/runner/.npm/_logs -type f -name '*-debug-0.log' -print -exec sed -n '1,260p' {} \;
            exit 1
          fi
      - name: build
        run: npm run build
      - name: publish diagnostics
        run: |
          npm config get registry
          npm view @defra/flood-webchat name version
      - name: version & publish
        run: |
          TAG_NAME="${{ github.event.release.tag_name }}"
          IS_PRE_RELEASE="${{ github.event.release.prerelease }}"
          VERSION_PATTERN="^v([0-9]{1,}.[0-9]{1,}.[0-9]{1,})(-[0-9A-Za-z-].*)?$"
          PRE_RELEASE_PATTERN="(-[0-9A-Za-z-].*)$"
          
          if ! [[ "$TAG_NAME" =~ $VERSION_PATTERN ]]; then
            echo FAILED TO MATCH VERSION_PATTERN
            exit 1
          fi
          
          if [[ "$IS_PRE_RELEASE" == "true" ]] || [[ "$TAG_NAME" =~ $PRE_RELEASE_PATTERN ]]; then
            RELEASE_TAG="pre-release"
          else
            RELEASE_TAG="latest"
          fi
          npm version --no-git-tag-version "${TAG_NAME}"
          npm publish --provenance --access public --tag="${RELEASE_TAG}"
